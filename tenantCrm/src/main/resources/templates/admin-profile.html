<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin &mdash; Profile</title>
	<link rel="stylesheet" th:href="@{/admin.css}">
	
	<link rel="stylesheet" th:href="@{/profile.css}">
	<script src="https://unpkg.com/lucide@1.24.0/dist/umd/lucide.min.js" integrity="sha384-mooE85Luwgx+AyykX7e90VcN8/QCFTSIwPuHLmvcsLVoA0en7lKYb9XlOzn5G2co" crossorigin="anonymous"></script>
</head>

<body>
	<div class="mobile-topbar"><button class="hamburger"
			id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">CRM
			Admin</span></div>
	<div class="sidebar-overlay" id="sidebarOverlay"></div>
	<div class="sidebar" id="sidebar">
		<a th:href="@{/admin/dashboard}" style="text-decoration: none; color: inherit; display: block;">
			<div class="sidebar-logo">
				<div class="logo-icon"><i data-lucide="shield"></i></div>
				<h2>Admin</h2>
			</div>
		</a>
		<div class="profile-box">
			<div class="profile-avatar" th:text="${#strings.substring(adminName ?: 'Admin', 0, 1).toUpperCase()}">A
			</div>
			<h3 th:text="${adminName} ?: 'Admin'">Admin</h3>
			<p th:text="${adminRole} ?: 'ADMIN'">ADMIN</p>
		</div>
		<ul class="sidebar-menu">
			<li><a th:href="@{/admin/dashboard}"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
			<li><a th:href="@{/admin/employees}"><i data-lucide="users"></i> Employees</a></li>
			<li><a th:href="@{/admin/tasks}"><i data-lucide="check-square"></i> Tasks</a></li>
			<li><a th:href="@{/admin/reports}"><i data-lucide="file-bar-chart"></i> Reports</a></li>
			<li><a th:href="@{/admin/schedule-meeting}"><i data-lucide="calendar-clock"></i> Meetings</a></li>
			<li><a th:href="@{/admin/calendar}"><i data-lucide="calendar"></i> Calendar</a></li>
			<li class="active"><a th:href="@{/admin/profile}"><i data-lucide="user"></i> Profile</a></li>
			<li><a th:href="@{/admin/settings}"><i data-lucide="settings"></i> Settings</a></li>
		</ul>
		<a href="#" data-logout style="text-decoration:none;"><button class="logout-btn"><i data-lucide="log-out"></i>
				Logout</button></a>
	</div>
	<div class="main-wrapper">
		<div class="topbar">
			<div>
				<h1>Profile</h1>
				<p class="topbar-subtitle">Manage your account profile</p>
				<div class="breadcrumb"><a th:href="@{/admin/dashboard}"><i data-lucide="home"></i>
						Home</a><span>&#8250;</span><span>Profile</span></div>
			</div>
			<div class="topbar-right">
				<button class="notif-btn"><i data-lucide="bell"></i><span class="notif-dot"></span></button>
				<div class="user-badge" th:text="${#strings.substring(adminName ?: 'Admin', 0, 1).toUpperCase()}">A
				</div>
			</div>
		</div>
		<div class="page-content">
			<div class="toast success" th:if="${successMessage}" th:text="${successMessage}"></div>
			<div class="toast error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
			<div class="card profile-combined-card">
				<div class="profile-identity">
					<div class="profile-page-avatar"
						th:text="${#strings.substring(adminName ?: 'Admin', 0, 1).toUpperCase()}">A</div>
					<h2 th:text="${adminName} ?: 'Admin'">Admin</h2>
					<p th:text="${adminEmail} ?: 'admin@example.com'">admin@example.com</p>
					<span class="role-badge" style="margin-top:12px;" th:text="${adminRole} ?: 'ADMIN'">ADMIN</span>
					<div style="margin-top:10px;"><span class="status-badge active">Online</span></div>
				</div>
				<div class="profile-divider"></div>
				<div class="profile-form-side">
					<div class="card-header" style="margin-bottom:18px;">
						<div>
							<h2>Edit Profile</h2>
							<p>Update your account information</p>
						</div>
					</div>
					<form th:action="@{/admin/update-profile}" method="post">
						<div class="form-grid">
							<div class="form-group"><label>Username</label>
								<div class="input-wrap"><input type="text" name="username" th:value="${adminName}"
										readonly style="background-color: #e5edf2; cursor: not-allowed;" autocomplete="username"></div>
							</div>
							<div class="form-group"><label>Email Address</label>
								<div class="input-wrap"><input type="email" name="email" th:value="${adminEmail}"
										placeholder="admin@example.com" readonly style="background-color: #e5edf2; cursor: not-allowed;" autocomplete="email"></div>
							</div>
							<div class="form-group"><label>New Password <span class="optional-text">(leave blank to
										keep)</span></label>
								<div class="input-wrap"><input class="has-toggle" type="password" name="password"
										id="passwordField" placeholder="New password"
										autocomplete="new-password"><button type="button" class="pwd-toggle"
										id="togglePassword" aria-label="Toggle password visibility"><i data-lucide="eye"
											id="togglePasswordIcon"></i></button></div>
							</div>
							<div class="form-group"><label>Confirm Password</label>
								<div class="input-wrap"><input class="has-toggle" type="password" name="confirmPassword"
										id="confirmPasswordField" placeholder="Confirm new password"
										autocomplete="new-password"><button type="button" class="pwd-toggle"
										id="toggleConfirmPassword" aria-label="Toggle confirm password visibility"><i
											data-lucide="eye" id="toggleConfirmPasswordIcon"></i></button></div>
							</div>
						</div>
						<div class="form-actions">
							<button type="reset" class="btn btn-clear"><i data-lucide="refresh-cw"></i> Reset</button>
							<button type="submit" class="btn btn-primary"><i data-lucide="check"></i> Save
								Changes</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script th:inline="javascript">
		(function () {
			var token = /*[[${newJwtToken}]]*/ null;
			var role = /*[[${newJwtRole}]]*/ null;
			var username = /*[[${newJwtUsername}]]*/ null;
			if (!token) return;
			localStorage.setItem('jwt_token', token);
			if (role) localStorage.setItem('jwt_role', role);
			if (username) localStorage.setItem('jwt_username', username);
			try {
				var payload = JSON.parse(atob(token.split('.')[1]));
				var expires = new Date(payload.exp * 1000).toUTCString();
				document.cookie = 'jwt_token=' + token + '; expires=' + expires + '; path=/; SameSite=Strict';
			} catch (e) {
				document.cookie = 'jwt_token=' + token + '; path=/; SameSite=Strict';
			}
		})();
	</script>
	<script>
		var hamburger = document.getElementById('hamburgerBtn'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebarOverlay');
		function openSidebar() {sidebar.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden';}
		function closeSidebar() {sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = '';}
		if (hamburger) hamburger.addEventListener('click', openSidebar);
		if (overlay) overlay.addEventListener('click', closeSidebar);
		document.querySelectorAll('.toast').forEach(function (t) {requestAnimationFrame(function () {t.classList.add('toast-show');}); setTimeout(function () {t.classList.remove('toast-show'); t.classList.add('toast-hide'); t.addEventListener('transitionend', function () {t.remove();}, {once: true});}, 3500);});
		lucide.createIcons();
		function setupPasswordToggle(inputId, toggleBtnId, iconId) {
			var input = document.getElementById(inputId), btn = document.getElementById(toggleBtnId), icon = document.getElementById(iconId);
			if (!input || !btn || !icon) return;
			btn.addEventListener('click', function () {
				var hidden = input.type === 'password';
				input.type = hidden ? 'text' : 'password';
				icon.setAttribute('data-lucide', hidden ? 'eye-off' : 'eye');
				lucide.createIcons();
			});
		}
		setupPasswordToggle('passwordField', 'togglePassword', 'togglePasswordIcon');
		setupPasswordToggle('confirmPasswordField', 'toggleConfirmPassword', 'toggleConfirmPasswordIcon');
	</script>
	<script th:src="@{/auth.js}"></script>
	<script th:src="@{/notifications.js}"></script>
</body>

</html>
