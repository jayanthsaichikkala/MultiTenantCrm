<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin — Add Admin</title>
    <link rel="stylesheet" th:href="@{/superadmin.css}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="mobile-topbar"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">SuperAdmin</span></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon"><i data-lucide="shield"></i></div><h2>SuperAdmin</h2></div>
    <div class="profile-box">
        <div class="profile-avatar">S</div>
        <h3>Super Admin</h3>
        <p th:text="${superAdminUser != null} ? ${superAdminUser.email} : 'superadmin@crm.com'">superadmin@crm.com</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/superadmin/dashboard}"><span class="menu-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard</a></li>
        <li class="active"><a th:href="@{/superadmin/admins}"><span class="menu-icon"><i data-lucide="users"></i></span> Admins</a></li>
        <li><a th:href="@{/superadmin/profile}"><span class="menu-icon"><i data-lucide="user"></i></span> Profile</a></li>
    </ul>
    <div class="sidebar-divider"></div>
    <a href="#" data-logout style="text-decoration:none;"><button class="logout-btn"><i data-lucide="log-out"></i> Logout</button></a>
</div>

<div class="main-wrapper">
    <div class="topbar">
        <div>
            <h1>Add Admin</h1>
            <p class="topbar-subtitle">Create a new administrator account</p>
            <div class="breadcrumb">
                <a th:href="@{/superadmin/dashboard}"><i data-lucide="home"></i> Home</a>
                <span>&#8250;</span>
                <a th:href="@{/superadmin/admins}">Admins</a>
                <span>&#8250;</span>
                <span>Add Admin</span>
            </div>
        </div>
        <div class="topbar-right">
            <button class="notif-btn"><i data-lucide="bell"></i><span class="notif-dot"></span></button>
            <div class="user-badge">S</div>
        </div>
    </div>

    <div class="page-content">
        <div class="toast success" th:if="${successMessage}"><i data-lucide="check-circle"></i> <span th:text="${successMessage}"></span></div>
        <div class="toast error"   th:if="${errorMessage}"><i data-lucide="alert-triangle"></i> <span th:text="${errorMessage}"></span></div>

        <div class="card" style="max-width:760px;">
            <div class="card-header">
                <div><h2>New Administrator</h2><p>Fill in the details below to create an admin account</p></div>
                <a th:href="@{/superadmin/admins}" class="btn-icon-close" title="Cancel"><i data-lucide="x"></i></a>
            </div>
            <div class="card-body">
                <form th:action="@{/superadmin/add-admin}" method="post">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-wrap"><input type="email" name="email" placeholder="admin@example.com" required></div>
                        </div>
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrap"><input type="text" name="username" placeholder="Enter username" required></div>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-wrap"><input type="password" name="password" placeholder="Create password" required></div>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-wrap"><input type="password" name="confirmPassword" placeholder="Confirm password" required></div>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <div class="input-wrap">
                                <select name="status" class="select-input">
                                    <option value="active">Active</option>
                                    <option value="inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <a th:href="@{/superadmin/admins}" class="btn btn-outline-cancel">Cancel</a>
                        <button type="submit" class="btn btn-primary"><i data-lucide="user-plus"></i> Add Admin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const hamburger=document.getElementById('hamburgerBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');document.body.style.overflow='hidden';}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');document.body.style.overflow='';}
    if(hamburger)hamburger.addEventListener('click',openSidebar);
    if(overlay)overlay.addEventListener('click',closeSidebar);
    document.querySelectorAll('.toast').forEach(t=>{setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .5s';},4000);});
    lucide.createIcons();
</script>
<script th:src="@{/auth.js}"></script>
</body>
</html>
