<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('My Files', 'files', ~{::section})}">
<head></head>
<body>
<section>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem">
    <div>
      <h2 style="font-size:1.1rem;font-weight:700;color:var(--text)">My Files</h2>
      <p style="font-size:.78rem;color:var(--muted);margin-top:2px">Documents and reports related to your leads</p>
    </div>
  </div>

  <!-- File type summary -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.4rem">
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center;transition:transform .25s,box-shadow .25s"
      onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(76,175,80,.12);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;font-size:1.3rem;color:#4CAF50">
        <i class="fas fa-file-alt"></i>
      </div>
      <p style="font-size:1.4rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)" th:text="${totalLeads ?: 0}">0</p>
      <p style="font-size:.72rem;color:var(--muted);margin-top:3px">Lead Reports</p>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center;transition:transform .25s,box-shadow .25s"
      onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(43,45,49,.1);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;font-size:1.3rem;color:var(--navy)">
        <i class="fas fa-file-pdf"></i>
      </div>
      <p style="font-size:1.4rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)" th:text="${approvedLeads ?: 0}">0</p>
      <p style="font-size:.72rem;color:var(--muted);margin-top:3px">Approved Docs</p>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center;transition:transform .25s,box-shadow .25s"
      onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(245,166,35,.12);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;font-size:1.3rem;color:#f5a623">
        <i class="fas fa-file-excel"></i>
      </div>
      <p style="font-size:1.4rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)" th:text="${pendingLeads ?: 0}">0</p>
      <p style="font-size:.72rem;color:var(--muted);margin-top:3px">Pending Docs</p>
    </div>
    <div style="background:var(--navy);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;font-size:1.3rem;color:#fff">
        <i class="fas fa-folder-open"></i>
      </div>
      <p style="font-size:1.4rem;font-weight:700;color:#fff;font-family:var(--font-mono)" th:text="${totalLeads ?: 0}">0</p>
      <p style="font-size:.72rem;color:rgba(255,255,255,.5);margin-top:3px">Total Files</p>
    </div>
  </div>

  <!-- Lead files table -->
  <div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden">
    <div style="padding:1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:.88rem;font-weight:600;color:var(--text)">Lead Documents</span>
      <span style="font-size:.75rem;color:var(--muted)" th:text="${totalLeads ?: 0} + ' files'">0 files</span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:#f9fafb;border-bottom:1px solid var(--border)">
            <th style="padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">#</th>
            <th style="padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">File Name</th>
            <th style="padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Type</th>
            <th style="padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Status</th>
            <th style="padding:10px 14px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Date</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="lead, s : ${allLeads}" style="border-bottom:1px solid #f3f4f6;transition:background .15s"
            onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
            <td style="padding:10px 14px;font-size:.82rem;color:var(--muted)" th:text="${s.count}">1</td>
            <td style="padding:10px 14px">
              <div style="display:flex;align-items:center;gap:8px">
                <i class="fas fa-file-alt" style="color:#4CAF50;font-size:.85rem"></i>
                <span style="font-size:.82rem;font-weight:600;color:var(--text)" th:text="${lead.customerName} + ' - Lead Report'">—</span>
              </div>
            </td>
            <td style="padding:10px 14px;font-size:.78rem;color:var(--muted)" th:text="${lead.source?.name()}">—</td>
            <td style="padding:10px 14px">
              <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:.68rem;font-weight:700"
                th:style="${lead.status?.name() == 'APPROVED'} ? 'background:#ecfdf5;color:#065f46' : (${lead.status?.name() == 'REJECTED'} ? 'background:#fef2f2;color:#991b1b' : 'background:#fff7ed;color:#c2410c')"
                th:text="${lead.status?.getDisplayName()}">Pending</span>
            </td>
            <td style="padding:10px 14px;font-size:.78rem;color:var(--muted)" th:text="${#temporals.format(lead.createdAt, 'dd MMM yyyy')}">—</td>
          </tr>
          <tr th:if="${#lists.isEmpty(allLeads)}">
            <td colspan="5" style="padding:2.5rem;text-align:center;color:var(--muted);font-size:.85rem">No files available yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</section>
</body>
</html>
