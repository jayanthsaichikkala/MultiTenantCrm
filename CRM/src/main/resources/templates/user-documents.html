<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Documents', 'documents', ~{::section})}">
<section>

  <h2 style="font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:1.4rem;display:flex;align-items:center;gap:8px">
    <i class="fas fa-file-alt" style="color:#8B5CF6"></i> Documents
  </h2>

  <!-- Deal documents from approved leads -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1.4rem;box-shadow:var(--shadow)">
    <h3 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1rem">Deal Documents</h3>

    <div th:if="${!#lists.isEmpty(allLeads)}">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.9rem">
        <div th:each="lead : ${allLeads}"
          style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem;display:flex;flex-direction:column;gap:.5rem">
          <div style="display:flex;align-items:center;gap:.6rem">
            <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#8B5CF6,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;flex-shrink:0">
              <i class="fas fa-file-contract"></i>
            </div>
            <div style="min-width:0">
              <p style="font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" th:text="${lead.customerName ?: '—'}">—</p>
              <p style="font-size:.68rem;color:var(--muted)" th:text="${lead.company ?: 'No company'}">—</p>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span th:if="${lead.status?.name() == 'APPROVED'}" style="padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;background:#D1FAE5;color:#065F46">Approved</span>
            <span th:if="${lead.status?.name() == 'PENDING'}"  style="padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;background:#FEF3C7;color:#92400E">Pending</span>
            <span th:if="${lead.status?.name() == 'REJECTED'}" style="padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;background:#FEE2E2;color:#991B1B">Rejected</span>
            <span style="font-size:.65rem;color:var(--muted)" th:text="${#temporals.format(lead.createdAt,'dd MMM')}">—</span>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(allLeads)}" style="text-align:center;padding:2.5rem;color:var(--muted)">
      <i class="fas fa-file-alt" style="font-size:1.5rem;display:block;margin-bottom:.5rem;opacity:.3"></i>
      No documents available yet.
    </div>
  </div>

  <!-- Info box -->
  <div style="background:#EEF2FF;border:1px solid #c7d2fe;border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:flex-start;gap:.75rem">
    <i class="fas fa-info-circle" style="color:#667EEA;margin-top:2px;flex-shrink:0"></i>
    <div>
      <p style="font-size:.82rem;font-weight:600;color:#4338ca;margin-bottom:.25rem">About Documents</p>
      <p style="font-size:.75rem;color:#4338ca;opacity:.85">Documents related to your approved deals and requests are listed here. Contact support if you need additional documents.</p>
    </div>
  </div>

</section>
