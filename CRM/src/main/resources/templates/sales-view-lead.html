<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Lead Details', 'my-leads', ~{::section})}">
<head></head>
<body>
<section>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.4rem">
    <a th:href="@{/sales/leads}" style="width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0">
      <i class="fas fa-arrow-left" style="font-size:.8rem"></i>
    </a>
    <h2 class="section-title"><i class="fas fa-user"></i> Lead Details</h2>
  </div>

  <div style="display:grid;grid-template-columns:1fr 320px;gap:1.2rem;align-items:start">

    <!-- Main details -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.6rem;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
        <div>
          <h3 style="font-size:1.1rem;font-weight:800;color:var(--text)" th:text="${lead.customerName}">—</h3>
          <p style="font-size:.78rem;color:var(--muted);margin-top:2px" th:text="${lead.company ?: 'No company'}">—</p>
        </div>
        <span class="badge"
          th:classappend="${lead.status?.name() == 'APPROVED'} ? ' badge--green' : (${lead.status?.name() == 'REJECTED'} ? ' badge--red' : ' badge--orange')"
          th:text="${lead.status?.getDisplayName()}">Pending</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem">
        <div>
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Email</label>
          <p style="font-size:.85rem;color:var(--text)" th:text="${lead.email ?: '—'}">—</p>
        </div>
        <div>
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Phone</label>
          <p style="font-size:.85rem;color:var(--text)" th:text="${lead.phone ?: '—'}">—</p>
        </div>
        <div>
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Source</label>
          <p style="font-size:.85rem;color:var(--text)" th:text="${lead.source?.name()}">—</p>
        </div>
        <div>
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Deal Value</label>
          <p style="font-size:.85rem;font-weight:700;color:var(--orange)" th:text="'₹' + ${#numbers.formatDecimal(lead.dealValue, 1, 'COMMA', 2, 'POINT')}">₹0</p>
        </div>
        <div>
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Created</label>
          <p style="font-size:.85rem;color:var(--text)" th:text="${#temporals.format(lead.createdAt, 'dd MMM yyyy, hh:mm a')}">—</p>
        </div>
        <div th:if="${lead.approvedAt != null}">
          <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Approved On</label>
          <p style="font-size:.85rem;color:var(--green)" th:text="${#temporals.format(lead.approvedAt, 'dd MMM yyyy')}">—</p>
        </div>
      </div>

      <div th:if="${lead.notes}" style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)">
        <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px">Notes</label>
        <p style="font-size:.83rem;color:var(--text-sm);line-height:1.6;background:var(--page-bg);padding:.8rem;border-radius:var(--radius-sm)" th:text="${lead.notes}">—</p>
      </div>

      <div th:if="${lead.rejectionNote}" style="margin-top:1rem;padding:.8rem;background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius-sm)">
        <label style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red);display:block;margin-bottom:4px"><i class="fas fa-times-circle"></i> Rejection Reason</label>
        <p style="font-size:.83rem;color:#991b1b" th:text="${lead.rejectionNote}">—</p>
      </div>
    </div>

    <!-- Side panel -->
    <div style="display:flex;flex-direction:column;gap:12px">

      <!-- Assigned to -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;box-shadow:var(--shadow-sm)">
        <h4 style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:.8rem;display:flex;align-items:center;gap:6px">
          <i class="fas fa-user-tie" style="color:var(--orange)"></i> Assigned To
        </h4>
        <p style="font-size:.83rem;color:var(--text)" th:text="${lead.assignedTo?.name ?: 'Unassigned'}">—</p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px" th:text="${lead.assignedTo?.role?.getDisplayName() ?: ''}">—</p>
      </div>

      <!-- Created by -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;box-shadow:var(--shadow-sm)">
        <h4 style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:.8rem;display:flex;align-items:center;gap:6px">
          <i class="fas fa-user-edit" style="color:var(--blue)"></i> Created By
        </h4>
        <p style="font-size:.83rem;color:var(--text)" th:text="${lead.createdBy?.name ?: 'Unknown'}">—</p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px" th:text="${lead.createdBy?.role?.getDisplayName() ?: ''}">—</p>
      </div>

      <!-- Quick actions -->
      <div style="background:var(--navy);border-radius:var(--radius-md);padding:1.2rem;box-shadow:var(--shadow-md)">
        <h4 style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:.8rem">Quick Actions</h4>
        <a th:href="@{/sales/leads}" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:.78rem;font-weight:500;margin-bottom:6px;transition:background .15s"
          onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='rgba(255,255,255,.06)'">
          <i class="fas fa-arrow-left" style="width:14px"></i> Back to Leads
        </a>
        <a th:href="@{/sales/leads/add}" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:rgba(245,166,35,.15);color:var(--orange);font-size:.78rem;font-weight:600;transition:background .15s"
          onmouseover="this.style.background='rgba(245,166,35,.25)'" onmouseout="this.style.background='rgba(245,166,35,.15)'">
          <i class="fas fa-plus" style="width:14px"></i> Add New Lead
        </a>
      </div>

    </div>
  </div>

</section>
</body>
</html>
