<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!--
  User Layout Fragment
  Usage: th:replace="~{fragments/user-layout :: layout('Page Title', 'active-nav-key', ~{::section})}"
  Nav keys: home, files, messages, notifications, location, graph
-->

<th:block th:fragment="layout(pageTitle, activeNav, content)">
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' – CRM Portal'">User Dashboard</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232B2D31'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' text-anchor='middle' fill='white'%3EU%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" th:href="@{/dashboard-user.css}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-profile">
      <div class="avatar-ring">
        <div class="avatar"><i class="fas fa-user"></i></div>
      </div>
      <h2 class="user-name" th:text="${#authentication?.name ?: 'User'}">USER</h2>
      <p class="user-email">user@company.com</p>
    </div>

    <nav class="sidebar-nav">
      <a th:href="@{/user/home}"          th:class="${activeNav=='home'}          ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-home"></i><span>Home</span>
      </a>
      <a th:href="@{/user/files}"         th:class="${activeNav=='files'}         ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-folder"></i><span>Files</span>
      </a>
      <a th:href="@{/user/messages}"      th:class="${activeNav=='messages'}      ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-envelope"></i><span>Messages</span>
      </a>
      <a th:href="@{/user/notifications}" th:class="${activeNav=='notifications'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-bell"></i><span>Notifications</span>
      </a>
      <a th:href="@{/user/location}"      th:class="${activeNav=='location'}      ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-map-marker-alt"></i><span>Location</span>
      </a>
      <a th:href="@{/user/graph}"         th:class="${activeNav=='graph'}         ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-chart-pie"></i><span>Graph</span>
      </a>
    </nav>

    <form th:action="@{/logout}" method="post" class="logout-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </button>
    </form>

  </aside>

  <!-- ===================== MAIN CONTENT ===================== -->
  <main class="main-content">

    <header class="top-bar">
      <h1 class="page-title" th:text="${pageTitle}">Dashboard</h1>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div th:if="${success}" style="padding:12px 16px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;font-size:.85rem;color:#065f46" th:text="${success}"></div>
    <div th:if="${error}"   style="padding:12px 16px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;font-size:.85rem;color:#991b1b" th:text="${error}"></div>

    <th:block th:replace="${content}" />

  </main>
</div>

<script>
  // Mobile sidebar toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar    = document.getElementById('sidebar');
  if (menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }
</script>

</body>
</html>
</th:block>

</html>
