<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Tasks', 'tasks', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Tasks</h1>
			<p>Manage and track all CRM tasks.</p>
		</div>
		<div class="page-header-actions">
			<button class="btn-primary">+ Add Task</button>
		</div>
	</div>

	<section class="table-card">
		<div class="table-header">
			<span class="table-count">All tasks</span>
		</div>
		<div class="table-wrap">
			<table>
				<thead>
					<tr>
						<th>#</th>
						<th>Title</th>
						<th>Due Date</th>
						<th>Priority</th>
						<th>Assigned To</th>
						<th>Status</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td colspan="6" class="table-empty">No tasks found. Click "+ Add Task" to create one. ✅</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>
</section>

</body>
</html>
