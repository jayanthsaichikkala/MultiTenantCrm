<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Lead Follow-ups', 'followups', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-redo-alt"></i> Lead Follow-ups</h2>
    <span style="font-size:.78rem;color:var(--muted);background:var(--surface);padding:4px 12px;border-radius:99px;border:1px solid var(--border)"
      th:text="${followupCount ?: 0} + ' pending'">0 pending</span>
  </div>

  <section class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Customer</th><th>Company</th><th>Deal Value (₹)</th><th>Status</th><th>Created</th><th>Notes</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="lead, s : ${pendingLeadsList}">
            <td th:text="${s.count}">1</td>
            <td class="td-name" th:text="${lead.customerName}">—</td>
            <td th:text="${lead.company ?: '—'}">—</td>
            <td th:text="${#numbers.formatDecimal(lead.dealValue, 1, 'COMMA', 2, 'POINT')}">0.00</td>
            <td>
              <span class="badge badge--orange" th:text="${lead.status?.getDisplayName()}">Pending</span>
            </td>
            <td th:text="${#temporals.format(lead.createdAt, 'dd MMM yyyy')}">—</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" th:text="${lead.notes ?: '—'}">—</td>
            <td class="td-actions">
              <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view">View</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(pendingLeadsList)}">
            <td colspan="8" class="td-empty">🎉 No pending follow-ups right now.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</section>
</body>
</html>
