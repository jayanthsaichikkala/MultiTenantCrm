<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Meetings', 'meetings', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Meetings</h1>
			<p>Schedule and manage customer meetings.</p>
		</div>
		<div class="page-header-actions">
			<button class="btn-primary">+ Schedule Meeting</button>
		</div>
	</div>

	<section class="table-card">
		<div class="table-header">
			<span class="table-count">Upcoming meetings</span>
		</div>
		<div class="table-wrap">
			<table>
				<thead>
					<tr>
						<th>#</th>
						<th>Title</th>
						<th>Date &amp; Time</th>
						<th>Location</th>
						<th>Attendees</th>
						<th>Status</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td colspan="6" class="table-empty">No meetings scheduled. Click "+ Schedule Meeting" to add one. 🗓️</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>
</section>

</body>
</html>
