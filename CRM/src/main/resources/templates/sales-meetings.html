<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Meetings', 'meetings', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-calendar-check"></i> Meetings</h2>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.4rem">
    <div class="stat-card" style="flex:1;min-width:140px;padding:1rem">
      <div class="stat-header"><span class="stat-label">Meetings Done</span><div class="stat-icon stat-icon--green"><i class="fas fa-calendar-check"></i></div></div>
      <div class="stat-value stat-value--dark" th:text="${meetingsDone ?: 0}">0</div>
      <div class="perf-bar perf-bar--green" style="margin-top:.5rem"><div th:style="|width:${meetingsDone > 0 ? (meetingsDone * 100 / (meetingsTarget ?: 1)) : 0}%|"></div></div>
      <p class="stat-sub" th:text="'Target: ' + ${meetingsTarget ?: 0}">Target: 0</p>
    </div>
    <div class="stat-card" style="flex:1;min-width:140px;padding:1rem">
      <div class="stat-header"><span class="stat-label">Active Leads</span><div class="stat-icon stat-icon--orange"><i class="fas fa-users"></i></div></div>
      <div class="stat-value stat-value--dark" th:text="${myLeadsCount ?: 0}">0</div>
      <p class="stat-sub">Potential meetings</p>
    </div>
  </div>

  <!-- Approved leads — schedule meetings -->
  <div class="section-header" style="margin-bottom:.8rem">
    <h2 class="section-title"><i class="fas fa-handshake"></i> Approved Leads — Schedule Meetings</h2>
  </div>
  <section class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Customer</th><th>Company</th><th>Email</th><th>Deal Value (₹)</th><th>Approved On</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="lead, s : ${approvedLeadsList}">
            <td th:text="${s.count}">1</td>
            <td class="td-name" th:text="${lead.customerName}">—</td>
            <td th:text="${lead.company ?: '—'}">—</td>
            <td th:text="${lead.email ?: '—'}">—</td>
            <td th:text="${#numbers.formatDecimal(lead.dealValue, 1, 'COMMA', 2, 'POINT')}">0.00</td>
            <td th:text="${lead.approvedAt != null ? #temporals.format(lead.approvedAt, 'dd MMM yyyy') : '—'}">—</td>
            <td class="td-actions">
              <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view">View</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(approvedLeadsList)}">
            <td colspan="7" class="td-empty">No approved leads to schedule meetings with yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</section>
</body>
</html>
