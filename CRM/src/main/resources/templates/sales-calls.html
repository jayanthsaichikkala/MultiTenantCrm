<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Calls', 'calls', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-phone-alt"></i> Calls</h2>
  </div>

  <!-- Quick stats -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.4rem">
    <div class="stat-card" style="flex:1;min-width:140px;padding:1rem">
      <div class="stat-header"><span class="stat-label">Calls Made</span><div class="stat-icon stat-icon--blue"><i class="fas fa-phone"></i></div></div>
      <div class="stat-value stat-value--dark" th:text="${callsMade ?: 0}">0</div>
      <div class="perf-bar perf-bar--blue" style="margin-top:.5rem"><div th:style="|width:${callsMade > 0 ? (callsMade * 100 / (callsTarget ?: 1)) : 0}%|"></div></div>
      <p class="stat-sub" th:text="'Target: ' + ${callsTarget ?: 0}">Target: 0</p>
    </div>
    <div class="stat-card" style="flex:1;min-width:140px;padding:1rem">
      <div class="stat-header"><span class="stat-label">Leads Contacted</span><div class="stat-icon stat-icon--orange"><i class="fas fa-users"></i></div></div>
      <div class="stat-value stat-value--dark" th:text="${myLeadsCount ?: 0}">0</div>
      <p class="stat-sub">Total leads</p>
    </div>
  </div>

  <!-- Leads to call -->
  <div class="section-header" style="margin-bottom:.8rem">
    <h2 class="section-title"><i class="fas fa-list"></i> Leads to Follow Up</h2>
  </div>
  <section class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Customer</th><th>Company</th><th>Phone</th><th>Email</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="lead, s : ${myLeads}">
            <td th:text="${s.count}">1</td>
            <td class="td-name" th:text="${lead.customerName}">—</td>
            <td th:text="${lead.company ?: '—'}">—</td>
            <td>
              <a th:if="${lead.phone}" th:href="'tel:' + ${lead.phone}"
                style="color:var(--blue);font-weight:600;font-size:.8rem"
                th:text="${lead.phone}">—</a>
              <span th:unless="${lead.phone}" style="color:var(--muted)">—</span>
            </td>
            <td th:text="${lead.email ?: '—'}">—</td>
            <td>
              <span class="badge"
                th:classappend="${lead.status?.name() == 'APPROVED'} ? ' badge--green' : (${lead.status?.name() == 'REJECTED'} ? ' badge--red' : ' badge--orange')"
                th:text="${lead.status?.getDisplayName()}">Pending</span>
            </td>
            <td class="td-actions">
              <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view">View</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(myLeads)}">
            <td colspan="7" class="td-empty">No leads to call right now.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</section>
</body>
</html>
