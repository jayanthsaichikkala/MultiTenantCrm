<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Calls', 'calls', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Calls</h1>
			<p>Log and track all customer calls.</p>
		</div>
		<div class="page-header-actions">
			<button class="btn-primary">+ Log Call</button>
		</div>
	</div>

	<section class="table-card">
		<div class="table-header">
			<span class="table-count">All calls</span>
		</div>
		<div class="table-wrap">
			<table>
				<thead>
					<tr>
						<th>#</th>
						<th>Contact</th>
						<th>Date &amp; Time</th>
						<th>Duration</th>
						<th>Status</th>
						<th>Logged By</th>
						<th>Notes</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td colspan="7" class="table-empty">No calls logged yet. Click "+ Log Call" to add one. 📞</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>
</section>

</body>
</html>
