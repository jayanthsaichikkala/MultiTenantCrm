<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Notifications', 'notifications', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-bell"></i> Notifications</h2>
  </div>

  <!-- Lead status changes as notifications -->
  <div style="display:flex;flex-direction:column;gap:10px">

    <div th:each="lead : ${approvedLeadsList}"
      style="background:var(--surface);border:1px solid #d1fae5;border-left:4px solid var(--green);border-radius:var(--radius-md);padding:1rem 1.2rem;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(52,211,153,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-check-circle" style="color:var(--green);font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text)">
          Lead Approved — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="${lead.company ?: ''} + ' · ₹' + ${#numbers.formatDecimal(lead.dealValue, 1, 'COMMA', 0, 'POINT')}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted)" th:text="${lead.approvedAt != null ? #temporals.format(lead.approvedAt, 'dd MMM') : '—'}">—</span>
    </div>

    <div th:each="lead : ${rejectedLeadsList}"
      style="background:var(--surface);border:1px solid #fee2e2;border-left:4px solid var(--red);border-radius:var(--radius-md);padding:1rem 1.2rem;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(252,129,129,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-times-circle" style="color:var(--red);font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text)">
          Lead Rejected — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="${lead.rejectionNote ?: 'No reason provided'}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted)" th:text="${#temporals.format(lead.updatedAt, 'dd MMM')}">—</span>
    </div>

    <div th:each="lead : ${pendingLeadsList}"
      style="background:var(--surface);border:1px solid #fef3c7;border-left:4px solid var(--orange);border-radius:var(--radius-md);padding:1rem 1.2rem;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(245,166,35,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-clock" style="color:var(--orange);font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text)">
          Awaiting Approval — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="${lead.company ?: ''} + ' · Submitted ' + ${#temporals.format(lead.createdAt, 'dd MMM yyyy')}">—</p>
      </div>
      <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view" style="font-size:.72rem">View</a>
    </div>

    <div th:if="${#lists.isEmpty(approvedLeadsList) and #lists.isEmpty(rejectedLeadsList) and #lists.isEmpty(pendingLeadsList)}"
      style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:3rem;text-align:center;color:var(--muted);font-size:.85rem">
      <i class="fas fa-bell-slash" style="font-size:2rem;margin-bottom:.8rem;display:block;opacity:.3"></i>
      No notifications right now.
    </div>

  </div>

</section>
</body>
</html>
