<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('New User', 'add-user', ~{::section})}">

<head></head>
<body>

<section>

	<!-- Page Header with Back button -->
	<div class="page-header">
		<div style="display:flex;align-items:center;gap:14px">
			<a th:href="@{/admin/users/add}" class="back-btn" title="Back to User Management">
				<svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
					<path fill-rule="evenodd"
						d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
						clip-rule="evenodd" />
				</svg>
			</a>
			<div>
				<h1>Add New User</h1>
				<p>Create a new Manager or Sales Executive account.</p>
			</div>
		</div>
	</div>

	<!-- Toast Notifications -->
	<div th:if="${error}" class="toast toast-error" th:text="${error}"></div>

	<!-- Form Card -->
	<div class="form-card">

		<div class="info-box">
			<svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16"
				style="display:inline;vertical-align:middle;margin-right:6px">
				<path fill-rule="evenodd"
					d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
					clip-rule="evenodd" />
			</svg>
			This creates both a login account and an employee record in the CRM.
		</div>

		<form th:action="@{/admin/users/new}" method="post" style="margin-top:20px">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

			<div class="form-grid">
				<div class="form-group form-group-full">
					<label class="form-label">Full Name <span class="required">*</span></label>
					<input type="text" name="fullName" class="form-input"
						placeholder="e.g. Sarah Mitchell" required th:value="${formFullName}" />
				</div>

				<div class="form-group">
					<label class="form-label">Username <span class="required">*</span></label>
					<input type="text" name="username" class="form-input"
						placeholder="e.g. sarah.mitchell" required th:value="${formUsername}" />
				</div>

				<div class="form-group">
					<label class="form-label">Email <span class="required">*</span></label>
					<input type="email" name="email" class="form-input"
						placeholder="e.g. sarah@company.com" required th:value="${formEmail}" />
				</div>

				<div class="form-group">
					<label class="form-label">Password <span class="required">*</span></label>
					<input type="password" name="password" class="form-input"
						placeholder="Minimum 8 characters" required minlength="8" />
				</div>

				<div class="form-group">
					<label class="form-label">Phone <span class="required">*</span></label>
					<input type="tel" name="phone" class="form-input"
						placeholder="+91 98765 43210" required th:value="${formPhone}" />
				</div>

				<div class="form-group">
					<label class="form-label">Department</label>
					<input type="text" name="department" class="form-input"
						placeholder="e.g. Sales (default)" th:value="${formDepartment}" />
				</div>

				<div class="form-group">
					<label class="form-label">Role <span class="required">*</span></label>
					<select name="role" class="form-select" required>
						<option value="">-- Select Role --</option>
						<option value="MANAGER" th:selected="${formRole == 'MANAGER'}">Manager</option>
						<option value="SALES_EXECUTIVE" th:selected="${formRole == 'SALES_EXECUTIVE'}">Sales Executive</option>
					</select>
				</div>
			</div>

			<div class="form-actions">
				<a th:href="@{/admin/users/add}" class="btn-secondary">
					<svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"
						style="display:inline;vertical-align:middle;margin-right:4px">
						<path fill-rule="evenodd"
							d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
							clip-rule="evenodd" />
					</svg>
					Back
				</a>
				<button type="submit" class="btn-primary">
					<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"
						style="display:inline;vertical-align:middle;margin-right:4px">
						<path fill-rule="evenodd"
							d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
							clip-rule="evenodd" />
					</svg>
					Create User
				</button>
			</div>
		</form>
	</div>

</section>

</body>
</html>
