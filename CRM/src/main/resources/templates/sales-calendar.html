<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Calendar', 'calendar', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-calendar-alt"></i> Calendar</h2>
  </div>

  <div style="display:grid;grid-template-columns:1fr 300px;gap:1.2rem;align-items:start">

    <!-- Calendar widget -->
    <div style="background:var(--navy);border-radius:var(--radius-md);padding:1.6rem;box-shadow:var(--shadow-md)">
      <div id="calendarWidget"></div>
    </div>

    <!-- Upcoming from approved leads -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;box-shadow:var(--shadow-sm)">
        <h4 style="font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:7px">
          <i class="fas fa-handshake" style="color:var(--orange)"></i> Active Deals
        </h4>
        <div th:each="lead : ${approvedLeadsList}" style="padding:.6rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <p style="font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" th:text="${lead.customerName}">—</p>
            <p style="font-size:.68rem;color:var(--muted)" th:text="${lead.company ?: ''}">—</p>
          </div>
          <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view" style="font-size:.68rem;flex-shrink:0">View</a>
        </div>
        <p th:if="${#lists.isEmpty(approvedLeadsList)}" style="font-size:.78rem;color:var(--muted);text-align:center;padding:.8rem 0">No active deals yet.</p>
      </div>
    </div>

  </div>

</section>

<script>
(function() {
  const container = document.getElementById('calendarWidget');
  const now = new Date();
  let year = now.getFullYear(), month = now.getMonth();

  function render() {
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    let html = `<div class="cal-header">
      <button class="cal-nav-btn" onclick="calPrev()"><i class="fas fa-chevron-left"></i></button>
      <span>${monthNames[month]} ${year}</span>
      <button class="cal-nav-btn" onclick="calNext()"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="cal-grid">`;

    dayNames.forEach(d => { html += `<div class="cal-day-name">${d}</div>`; });

    for (let i = 0; i < firstDay; i++) html += `<div></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
      html += `<div class="cal-day${isToday ? ' cal-day--today' : ''}">${d}</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
  }

  window.calPrev = function() { if (month === 0) { month = 11; year--; } else month--; render(); };
  window.calNext = function() { if (month === 11) { month = 0; year++; } else month++; render(); };
  render();
})();
</script>

</body>
</html>
