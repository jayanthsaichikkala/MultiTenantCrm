<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Messages', 'messages', ~{::section})}">
<head></head>
<body>
<section>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem">
    <div>
      <h2 style="font-size:1.1rem;font-weight:700;color:var(--text)">Messages</h2>
      <p style="font-size:.78rem;color:var(--muted);margin-top:2px">System notifications and lead updates</p>
    </div>
    <span style="background:var(--navy);color:#fff;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:99px"
      th:text="${messageCount ?: 0} + ' new'">0 new</span>
  </div>

  <!-- Message list from lead activity -->
  <div style="display:flex;flex-direction:column;gap:10px">

    <div th:each="lead : ${approvedLeads}"
      style="background:var(--surface);border-radius:var(--radius);padding:1rem 1.2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;border-left:4px solid #4CAF50;transition:transform .2s,box-shadow .2s"
      onmouseover="this.style.transform='translateX(4px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(76,175,80,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-check-circle" style="color:#4CAF50;font-size:.95rem"></i>
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:.85rem;font-weight:600;color:var(--text)">
          Lead Approved — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="${lead.company ?: ''} + ' · Deal value: ₹' + ${#numbers.formatDecimal(lead.dealValue, 1, 'COMMA', 0, 'POINT')}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted);white-space:nowrap"
        th:text="${lead.approvedAt != null ? #temporals.format(lead.approvedAt, 'dd MMM') : '—'}">—</span>
    </div>

    <div th:each="lead : ${rejectedLeads}"
      style="background:var(--surface);border-radius:var(--radius);padding:1rem 1.2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;border-left:4px solid #ef4444;transition:transform .2s,box-shadow .2s"
      onmouseover="this.style.transform='translateX(4px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(239,68,68,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-times-circle" style="color:#ef4444;font-size:.95rem"></i>
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:.85rem;font-weight:600;color:var(--text)">
          Lead Rejected — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="${lead.rejectionNote ?: 'No reason provided'}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted);white-space:nowrap"
        th:text="${#temporals.format(lead.updatedAt, 'dd MMM')}">—</span>
    </div>

    <div th:each="lead : ${pendingLeads}"
      style="background:var(--surface);border-radius:var(--radius);padding:1rem 1.2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;border-left:4px solid #f59e0b;transition:transform .2s,box-shadow .2s"
      onmouseover="this.style.transform='translateX(4px)';this.style.boxShadow='var(--shadow-lg)'"
      onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
      <div style="width:40px;height:40px;border-radius:50%;background:rgba(245,158,11,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-clock" style="color:#f59e0b;font-size:.95rem"></i>
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:.85rem;font-weight:600;color:var(--text)">
          Lead Pending — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:2px"
          th:text="'Submitted ' + ${#temporals.format(lead.createdAt, 'dd MMM yyyy')}">—</p>
      </div>
      <span style="font-size:.68rem;background:#fff7ed;color:#c2410c;padding:2px 8px;border-radius:99px;font-weight:700">Pending</span>
    </div>

    <div th:if="${#lists.isEmpty(approvedLeads) and #lists.isEmpty(rejectedLeads) and #lists.isEmpty(pendingLeads)}"
      style="background:var(--surface);border-radius:var(--radius);padding:3rem;text-align:center;box-shadow:var(--shadow)">
      <i class="fas fa-inbox" style="font-size:2.5rem;color:var(--muted);opacity:.3;display:block;margin-bottom:.8rem"></i>
      <p style="font-size:.88rem;color:var(--muted)">No messages yet.</p>
    </div>

  </div>

</section>
</body>
</html>
