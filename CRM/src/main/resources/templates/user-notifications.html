<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Notifications', 'notifications', ~{::section})}">
<section>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.75rem">
    <h2 style="font-size:1.2rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px">
      <i class="fas fa-bell" style="color:#667EEA"></i> Notifications
    </h2>
    <span style="font-size:.75rem;color:var(--muted);background:var(--surface);padding:4px 12px;border-radius:99px;border:1px solid var(--border)"
      th:text="${notifCount ?: 0} + ' unread'">0 unread</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:.75rem">

    <!-- Approved -->
    <div th:each="lead : ${approvedList}"
      style="background:var(--surface);border:1px solid #D1FAE5;border-left:4px solid #22c55e;border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)">
      <div style="width:38px;height:38px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-check-circle" style="color:#22c55e;font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px">
          Deal Approved — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted)" th:text="${lead.company ?: ''} + ' · ₹' + ${lead.dealValue != null ? #numbers.formatDecimal(lead.dealValue,1,'COMMA',0,'POINT') : '0'}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted);flex-shrink:0" th:text="${lead.approvedAt != null ? #temporals.format(lead.approvedAt,'dd MMM') : '—'}">—</span>
    </div>

    <!-- Rejected -->
    <div th:each="lead : ${rejectedList}"
      style="background:var(--surface);border:1px solid #FEE2E2;border-left:4px solid #EF4444;border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)">
      <div style="width:38px;height:38px;border-radius:50%;background:#FEE2E2;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-times-circle" style="color:#EF4444;font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px">
          Request Rejected — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted)" th:text="${lead.rejectionNote ?: 'No reason provided'}">—</p>
      </div>
      <span style="font-size:.68rem;color:var(--muted);flex-shrink:0" th:text="${#temporals.format(lead.updatedAt,'dd MMM')}">—</span>
    </div>

    <!-- Pending -->
    <div th:each="lead : ${pendingList}"
      style="background:var(--surface);border:1px solid #FEF3C7;border-left:4px solid #F59E0B;border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)">
      <div style="width:38px;height:38px;border-radius:50%;background:#FEF3C7;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-clock" style="color:#F59E0B;font-size:.9rem"></i>
      </div>
      <div style="flex:1">
        <p style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px">
          Request Pending — <span th:text="${lead.customerName}">—</span>
        </p>
        <p style="font-size:.72rem;color:var(--muted)" th:text="${lead.company ?: ''} + ' · Submitted ' + ${#temporals.format(lead.createdAt,'dd MMM yyyy')}">—</p>
      </div>
      <a th:href="@{/user/requests}" style="font-size:.72rem;color:#667EEA;text-decoration:none;flex-shrink:0">View →</a>
    </div>

    <div th:if="${#lists.isEmpty(approvedList) and #lists.isEmpty(rejectedList) and #lists.isEmpty(pendingList)}"
      style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3rem;text-align:center;color:var(--muted)">
      <i class="fas fa-bell-slash" style="font-size:1.5rem;display:block;margin-bottom:.5rem;opacity:.3"></i>
      No notifications right now.
    </div>
  </div>

</section>
