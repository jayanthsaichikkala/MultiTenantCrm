<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Add Lead', 'add-lead', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-user-plus"></i> Add New Lead</h2>
    <a th:href="@{/sales/leads}" class="act-link act-view" style="padding:8px 16px;font-size:.8rem">← Back to Leads</a>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:2rem;box-shadow:var(--shadow-sm);max-width:760px">

    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:1.5rem;font-size:.82rem;color:#92400e;display:flex;align-items:center;gap:8px">
      <i class="fas fa-info-circle"></i>
      After submission, this lead will be sent to your Manager for approval.
    </div>

    <form th:action="@{/sales/leads/submit}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem">
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Customer Name <span style="color:var(--red)">*</span></label>
          <input type="text" name="customerName" required placeholder="e.g. Rahul Sharma"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
        </div>
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Company</label>
          <input type="text" name="company" placeholder="e.g. TechCorp Pvt Ltd"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
        </div>
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Email</label>
          <input type="email" name="email" placeholder="contact@company.com"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
        </div>
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Phone</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
        </div>
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Deal Value (₹) <span style="color:var(--red)">*</span></label>
          <input type="number" name="dealValue" min="0" step="0.01" placeholder="0.00" required
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
        </div>
        <div>
          <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Source</label>
          <select name="source"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text)">
            <option value="WEBSITE">Website</option>
            <option value="REFERRAL">Referral</option>
            <option value="SOCIAL">Social Media</option>
            <option value="COLD_CALL">Cold Call</option>
            <option value="EMAIL">Email</option>
            <option value="OTHER" selected>Other</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:1.4rem">
        <label style="font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:5px">Notes</label>
        <textarea name="notes" rows="3" placeholder="Additional notes about this lead…"
          style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;outline:none;background:var(--surface);color:var(--text);resize:vertical"></textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--border)">
        <a th:href="@{/sales/leads}" style="padding:9px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;color:var(--muted);background:var(--surface)">Cancel</a>
        <button type="submit" style="padding:9px 24px;background:var(--orange);color:var(--navy);border-radius:var(--radius-sm);font-size:.82rem;font-weight:700;border:none;cursor:pointer">
          <i class="fas fa-paper-plane" style="margin-right:6px"></i>Submit for Approval
        </button>
      </div>
    </form>
  </div>

</section>
</body>
</html>
