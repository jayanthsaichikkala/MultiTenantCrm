<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('Tasks', 'tasks', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-tasks"></i> My Tasks</h2>
  </div>

  <!-- Task checklist from leads -->
  <div class="section-header" style="margin-bottom:.8rem">
    <h2 class="section-title" style="font-size:.85rem"><i class="fas fa-clock"></i> Pending Lead Actions</h2>
  </div>
  <section class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Task</th><th>Lead</th><th>Company</th><th>Priority</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="lead, s : ${pendingLeadsList}">
            <td th:text="${s.count}">1</td>
            <td style="font-weight:600;color:var(--text)">Follow up on lead</td>
            <td class="td-name" th:text="${lead.customerName}">—</td>
            <td th:text="${lead.company ?: '—'}">—</td>
            <td><span class="badge badge--orange">High</span></td>
            <td><span class="badge badge--orange" th:text="${lead.status?.getDisplayName()}">Pending</span></td>
            <td class="td-actions">
              <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view">View Lead</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(pendingLeadsList)}">
            <td colspan="7" class="td-empty">🎉 No pending tasks. You're all caught up!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- All leads quick overview -->
  <div class="section-header" style="margin-top:1.4rem;margin-bottom:.8rem">
    <h2 class="section-title" style="font-size:.85rem"><i class="fas fa-list-check"></i> All Lead Actions</h2>
    <a th:href="@{/sales/leads}" class="link-all">View All Leads →</a>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
    <div th:each="lead : ${myLeads}"
      style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <span style="font-size:.8rem;font-weight:700;color:var(--text)" th:text="${lead.customerName}">—</span>
        <span class="badge"
          th:classappend="${lead.status?.name() == 'APPROVED'} ? ' badge--green' : (${lead.status?.name() == 'REJECTED'} ? ' badge--red' : ' badge--orange')"
          th:text="${lead.status?.getDisplayName()}">—</span>
      </div>
      <p style="font-size:.72rem;color:var(--muted);margin-bottom:.6rem" th:text="${lead.company ?: 'No company'}">—</p>
      <a th:href="@{/sales/leads/{id}(id=${lead.id})}" class="act-link act-view" style="font-size:.72rem">View →</a>
    </div>
    <div th:if="${#lists.isEmpty(myLeads)}"
      style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:.85rem">
      No leads assigned yet.
    </div>
  </div>

</section>
</body>
</html>
