<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Meetings', 'meetings', ~{::section})}">
<section>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.75rem">
    <h2 style="font-size:1.2rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px">
      <i class="fas fa-calendar-check" style="color:#3B82F6"></i> Meetings
    </h2>
    <button onclick="document.getElementById('reqMeetingModal').style.display='flex'"
      style="padding:.55rem 1.1rem;background:linear-gradient(135deg,#667EEA,#764BA2);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer">
      <i class="fas fa-plus"></i> Request Meeting
    </button>
  </div>

  <!-- Upcoming from approved deals -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1.4rem;box-shadow:var(--shadow)">
    <h3 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1rem">Meetings with Your Account Team</h3>
    <div th:if="${!#lists.isEmpty(approvedList)}">
      <div th:each="lead : ${approvedList}"
        style="display:flex;align-items:center;gap:1rem;padding:.9rem;background:var(--bg);border-radius:10px;margin-bottom:.75rem;border:1px solid var(--border)">
        <div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#667EEA,#764BA2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;flex-shrink:0">
          <i class="fas fa-handshake"></i>
        </div>
        <div style="flex:1">
          <p style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px" th:text="${lead.customerName ?: '—'}">—</p>
          <p style="font-size:.72rem;color:var(--muted)" th:text="${lead.company ?: 'No company'} + ' · Deal approved'">—</p>
        </div>
        <span style="font-size:.72rem;color:var(--muted)" th:text="${lead.approvedAt != null ? #temporals.format(lead.approvedAt,'dd MMM yyyy') : '—'}">—</span>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(approvedList)}" style="text-align:center;padding:2rem;color:var(--muted)">
      <i class="fas fa-calendar-check" style="font-size:1.5rem;display:block;margin-bottom:.5rem;opacity:.3"></i>
      No meetings scheduled. Get a deal approved to schedule a meeting.
    </div>
  </div>

  <!-- Request Meeting Modal -->
  <div id="reqMeetingModal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px)">
    <div style="background:var(--surface);border-radius:12px;width:440px;max-width:94vw;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.3rem;border-bottom:1px solid var(--border)">
        <h3 style="font-size:.95rem;font-weight:700;color:var(--text)">Request a Meeting</h3>
        <button onclick="document.getElementById('reqMeetingModal').style.display='none'" style="width:26px;height:26px;border-radius:6px;border:none;background:var(--bg);cursor:pointer;color:var(--muted)"><i class="fas fa-times"></i></button>
      </div>
      <div style="padding:1.2rem 1.3rem">
        <div style="margin-bottom:.9rem">
          <label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Subject</label>
          <input type="text" placeholder="e.g. Deal discussion" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem">
          <div>
            <label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Preferred Date</label>
            <input type="date" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none">
          </div>
          <div>
            <label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Preferred Time</label>
            <input type="time" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none">
          </div>
        </div>
        <div>
          <label style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Notes</label>
          <textarea rows="3" placeholder="What would you like to discuss?" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;resize:vertical"></textarea>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:.75rem;padding:.9rem 1.3rem;border-top:1px solid var(--border)">
        <button onclick="document.getElementById('reqMeetingModal').style.display='none'" style="padding:8px 18px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;font-weight:600;background:var(--surface);cursor:pointer;color:var(--muted)">Cancel</button>
        <button onclick="document.getElementById('reqMeetingModal').style.display='none'" style="padding:8px 18px;background:linear-gradient(135deg,#667EEA,#764BA2);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer">
          <i class="fas fa-paper-plane"></i> Send Request
        </button>
      </div>
    </div>
  </div>

</section>
