<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Location', 'location', ~{::section})}">
<head></head>
<body>
<section>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem">
    <div>
      <h2 style="font-size:1.1rem;font-weight:700;color:var(--text)">Location</h2>
      <p style="font-size:.78rem;color:var(--muted);margin-top:2px">Lead locations and company regions</p>
    </div>
  </div>

  <!-- Region summary cards -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.4rem">
    <div style="background:var(--navy);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center">
      <i class="fas fa-map-marker-alt" style="font-size:1.5rem;color:#4CAF50;margin-bottom:.6rem;display:block"></i>
      <p style="font-size:1.3rem;font-weight:700;color:#fff;font-family:var(--font-mono)" th:text="${totalLeads ?: 0}">0</p>
      <p style="font-size:.7rem;color:rgba(255,255,255,.5);margin-top:3px">Total Locations</p>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center">
      <i class="fas fa-building" style="font-size:1.5rem;color:var(--orange);margin-bottom:.6rem;display:block"></i>
      <p style="font-size:1.3rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)" th:text="${approvedLeads ?: 0}">0</p>
      <p style="font-size:.7rem;color:var(--muted);margin-top:3px">Active Companies</p>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center">
      <i class="fas fa-globe" style="font-size:1.5rem;color:#4CAF50;margin-bottom:.6rem;display:block"></i>
      <p style="font-size:1.3rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)">6</p>
      <p style="font-size:.7rem;color:var(--muted);margin-top:3px">Lead Sources</p>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center">
      <i class="fas fa-map" style="font-size:1.5rem;color:var(--navy);margin-bottom:.6rem;display:block"></i>
      <p style="font-size:1.3rem;font-weight:700;color:var(--navy);font-family:var(--font-mono)" th:text="${pendingLeads ?: 0}">0</p>
      <p style="font-size:.7rem;color:var(--muted);margin-top:3px">Pending Regions</p>
    </div>
  </div>

  <!-- Map placeholder + lead locations table -->
  <div style="display:grid;grid-template-columns:1fr 320px;gap:1.2rem;align-items:start">

    <!-- Map placeholder -->
    <div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden">
      <div style="background:linear-gradient(135deg,#e8f5e9,#f1f8e9);height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative">
        <!-- Simple SVG map dots -->
        <svg viewBox="0 0 400 200" style="width:100%;height:100%;position:absolute;top:0;left:0;opacity:.15">
          <rect width="400" height="200" fill="#4CAF50"/>
          <circle cx="80" cy="80" r="30" fill="none" stroke="#2B2D31" stroke-width="1"/>
          <circle cx="200" cy="60" r="40" fill="none" stroke="#2B2D31" stroke-width="1"/>
          <circle cx="320" cy="100" r="25" fill="none" stroke="#2B2D31" stroke-width="1"/>
          <circle cx="150" cy="140" r="35" fill="none" stroke="#2B2D31" stroke-width="1"/>
        </svg>
        <i class="fas fa-map-marked-alt" style="font-size:3rem;color:#4CAF50;margin-bottom:.8rem;position:relative;z-index:1"></i>
        <p style="font-size:.88rem;font-weight:600;color:var(--navy);position:relative;z-index:1">Lead Location Map</p>
        <p style="font-size:.72rem;color:var(--muted);margin-top:4px;position:relative;z-index:1">Company locations from your leads</p>
      </div>
      <div style="padding:1rem 1.4rem;border-top:1px solid var(--border)">
        <p style="font-size:.78rem;color:var(--muted)">Showing <strong th:text="${totalLeads ?: 0}">0</strong> lead locations</p>
      </div>
    </div>

    <!-- Lead companies list -->
    <div style="background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden">
      <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border)">
        <span style="font-size:.85rem;font-weight:600;color:var(--text)">Companies</span>
      </div>
      <div th:each="lead : ${allLeads}"
        style="display:flex;align-items:center;gap:10px;padding:.75rem 1.2rem;border-bottom:1px solid #f3f4f6;transition:background .15s"
        onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
        <div style="width:32px;height:32px;border-radius:8px;background:rgba(76,175,80,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fas fa-building" style="color:#4CAF50;font-size:.75rem"></i>
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
            th:text="${lead.company ?: lead.customerName}">—</p>
          <p style="font-size:.68rem;color:var(--muted)" th:text="${lead.source?.name()}">—</p>
        </div>
        <span style="font-size:.65rem;padding:2px 7px;border-radius:99px;font-weight:700;white-space:nowrap"
          th:style="${lead.status?.name() == 'APPROVED'} ? 'background:#ecfdf5;color:#065f46' : 'background:#fff7ed;color:#c2410c'"
          th:text="${lead.status?.getDisplayName()}">—</span>
      </div>
      <div th:if="${#lists.isEmpty(allLeads)}"
        style="padding:2rem;text-align:center;color:var(--muted);font-size:.82rem">No locations yet.</div>
    </div>

  </div>

</section>
</body>
</html>
