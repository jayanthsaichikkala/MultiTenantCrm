<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Pipeline Stages', 'pipeline-stages', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Pipeline Stages</h1>
			<p>Configure and manage sales pipeline stages.</p>
		</div>
	</div>

	<section class="pipeline-section">
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-blue"></span>
				<span class="stage-name">Prospecting</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-yellow"></span>
				<span class="stage-name">Qualification</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-orange"></span>
				<span class="stage-name">Proposal</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-purple"></span>
				<span class="stage-name">Negotiation</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-green"></span>
				<span class="stage-name">Closed Won</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
		<div class="pipeline-stage">
			<div class="stage-header">
				<span class="stage-dot stage-dot-red"></span>
				<span class="stage-name">Closed Lost</span>
				<span class="stage-count">0</span>
			</div>
			<div class="stage-bar"><div style="width:0%"></div></div>
		</div>
	</section>

	<div class="form-card" style="margin-top:28px">
		<p style="color:var(--muted);font-size:.9rem;text-align:center;padding:40px 0;">
			Pipeline stage management coming soon.
		</p>
	</div>
</section>

</body>
</html>
