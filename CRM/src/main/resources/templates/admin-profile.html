<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Profile', 'profile', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Profile</h1>
			<p>View and update your account details.</p>
		</div>
	</div>

	<!-- Toast Notifications -->
	<div th:if="${success}" class="toast toast-success" th:text="${success}"></div>
	<div th:if="${error}"   class="toast toast-error"   th:text="${error}"></div>

	<div class="form-card" style="max-width:780px">

		<!-- Avatar + name block -->
		<div style="display:flex;align-items:center;gap:20px;padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:24px">
			<div class="avatar"
				style="width:72px;height:72px;font-size:1.75rem;flex-shrink:0;background:linear-gradient(135deg,#667EEA,#764BA2)"
				th:text="${adminUser?.username != null ? adminUser.username.substring(0,1).toUpperCase() : 'A'}">A</div>
			<div>
				<div style="font-size:1.25rem;font-weight:700;color:var(--text)"
					th:text="${adminUser?.username ?: 'Admin'}">Admin</div>
				<div style="font-size:0.85rem;color:var(--muted);margin-top:2px"
					th:text="${adminUser?.email ?: ''}"></div>
				<span class="badge badge-approved" style="margin-top:6px;display:inline-flex"
					th:text="${adminUser?.role?.name() ?: 'ADMIN'}">ADMIN</span>
			</div>
		</div>

		<!-- Edit Form -->
		<form th:action="@{/admin/profile/update}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

			<div class="form-grid">

				<!-- Editable fields -->
				<div class="form-group">
					<label class="form-label">Username <span class="required">*</span></label>
					<input type="text" name="username" class="form-input"
						th:value="${adminUser?.username ?: ''}" required />
				</div>

				<div class="form-group">
					<label class="form-label">Email <span class="required">*</span></label>
					<input type="email" name="email" class="form-input"
						th:value="${adminUser?.email ?: ''}" required />
				</div>

				<div class="form-group">
					<label class="form-label">Phone</label>
					<input type="tel" name="phone" class="form-input"
						th:value="${adminUser?.phone ?: ''}"
						maxlength="12"
						oninput="this.value=this.value.replace(/[^0-9+]/g,'').slice(0,12)"
						placeholder="+91 98765 43210" />
				</div>

				<div class="form-group">
					<label class="form-label">Company Name</label>
					<input type="text" name="companyName" class="form-input"
						th:value="${adminUser?.companyName ?: ''}" placeholder="Your company" />
				</div>

				<div class="form-group form-group-full">
					<label class="form-label">Address</label>
					<input type="text" name="address" class="form-input"
						th:value="${adminUser?.address ?: ''}" placeholder="Your address" />
				</div>

				<!-- Read-only fields -->
				<div class="form-group">
					<label class="form-label" style="display:flex;align-items:center;gap:6px">
						Role
						<span style="font-size:.7rem;color:var(--muted);font-weight:400">(read-only)</span>
					</label>
					<input type="text" class="form-input"
						th:value="${adminUser?.role?.name() ?: '—'}"
						readonly style="background:var(--bg);cursor:not-allowed;color:var(--muted)" />
				</div>

				<div class="form-group">
					<label class="form-label" style="display:flex;align-items:center;gap:6px">
						Tenant ID
						<span style="font-size:.7rem;color:var(--muted);font-weight:400">(read-only)</span>
					</label>
					<input type="text" class="form-input"
						th:value="${adminUser?.tenantId ?: '—'}"
						readonly style="background:var(--bg);cursor:not-allowed;color:var(--muted)" />
				</div>

				<div class="form-group">
					<label class="form-label">Status</label>
					<input type="text" class="form-input"
						th:value="${adminUser?.status?.name() ?: '—'}"
						readonly style="background:var(--bg);cursor:not-allowed;color:var(--muted)" />
				</div>

				<div class="form-group">
					<label class="form-label">Member Since</label>
					<input type="text" class="form-input"
						th:value="${adminUser?.createdAt != null ? #temporals.format(adminUser.createdAt, 'dd MMM yyyy') : '—'}"
						readonly style="background:var(--bg);cursor:not-allowed;color:var(--muted)" />
				</div>

			</div>

			<div class="form-actions">
				<button type="submit" class="btn-primary">
					<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"
						style="display:inline;vertical-align:middle;margin-right:4px">
						<path fill-rule="evenodd"
							d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
							clip-rule="evenodd" />
					</svg>
					Save Changes
				</button>
			</div>
		</form>
	</div>
</section>

</body>
</html>
