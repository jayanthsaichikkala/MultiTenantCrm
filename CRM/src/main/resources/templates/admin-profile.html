<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Profile', 'profile', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1>Profile</h1>
			<p>Manage your account details and preferences.</p>
		</div>
	</div>

	<div class="form-card">
		<div class="form-grid">
			<div class="form-group form-group-full" style="align-items:center;padding-bottom:20px;border-bottom:1px solid var(--border)">
				<div class="avatar" style="width:72px;height:72px;font-size:1.75rem;margin-bottom:12px">A</div>
				<span style="font-weight:700;font-size:1.1rem" th:text="${#authentication?.name ?: 'Admin'}">Admin</span>
				<small style="color:var(--muted)">Administrator</small>
			</div>

			<div class="form-group">
				<label class="form-label">Username</label>
				<input type="text" class="form-input" th:value="${#authentication?.name ?: ''}" readonly
					style="background:var(--bg);cursor:not-allowed" />
			</div>

			<div class="form-group">
				<label class="form-label">Role</label>
				<input type="text" class="form-input" value="Administrator" readonly
					style="background:var(--bg);cursor:not-allowed" />
			</div>
		</div>

		<p style="color:var(--muted);font-size:.875rem;text-align:center;padding:20px 0 0">
			Profile editing coming soon.
		</p>
	</div>
</section>

</body>
</html>
