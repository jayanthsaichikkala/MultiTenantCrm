<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/user-layout :: layout('Activity History', 'activity', ~{::section})}">
<section>

  <h2 style="font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:1.4rem;display:flex;align-items:center;gap:8px">
    <i class="fas fa-history" style="color:#667EEA"></i> Activity History
  </h2>

  <!-- Timeline -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;box-shadow:var(--shadow)">
    <h3 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1.2rem">All Activity</h3>

    <div th:if="${!#lists.isEmpty(allLeads)}" style="position:relative;padding-left:1.5rem">
      <!-- Timeline line -->
      <div style="position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)"></div>

      <div th:each="lead : ${allLeads}" style="position:relative;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)">
        <!-- Dot -->
        <div th:style="${lead.status?.name() == 'APPROVED'} ? 'position:absolute;left:-1.5rem;top:4px;width:14px;height:14px;border-radius:50%;background:#22c55e;border:2px solid var(--surface)' :
                        (${lead.status?.name() == 'REJECTED'} ? 'position:absolute;left:-1.5rem;top:4px;width:14px;height:14px;border-radius:50%;background:#EF4444;border:2px solid var(--surface)' :
                        'position:absolute;left:-1.5rem;top:4px;width:14px;height:14px;border-radius:50%;background:#F59E0B;border:2px solid var(--surface)')"></div>

        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
          <div>
            <p style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px">
              <span th:if="${lead.status?.name() == 'APPROVED'}">Deal approved — </span>
              <span th:if="${lead.status?.name() == 'PENDING'}">Request submitted — </span>
              <span th:if="${lead.status?.name() == 'REJECTED'}">Request rejected — </span>
              <span th:text="${lead.customerName ?: '—'}">—</span>
            </p>
            <p style="font-size:.74rem;color:var(--muted)" th:text="${lead.company ?: 'No company'} + ' · ₹' + ${lead.dealValue != null ? #numbers.formatDecimal(lead.dealValue,1,'COMMA',0,'POINT') : '0'}">—</p>
          </div>
          <div style="display:flex;align-items:center;gap:.75rem;flex-shrink:0">
            <span th:if="${lead.status?.name() == 'APPROVED'}" style="padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;background:#D1FAE5;color:#065F46">Approved</span>
            <span th:if="${lead.status?.name() == 'PENDING'}"  style="padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;background:#FEF3C7;color:#92400E">Pending</span>
            <span th:if="${lead.status?.name() == 'REJECTED'}" style="padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;background:#FEE2E2;color:#991B1B">Rejected</span>
            <span style="font-size:.72rem;color:var(--muted)" th:text="${#temporals.format(lead.createdAt,'dd MMM yyyy')}">—</span>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(allLeads)}" style="text-align:center;padding:2.5rem;color:var(--muted)">
      <i class="fas fa-history" style="font-size:1.5rem;display:block;margin-bottom:.5rem;opacity:.3"></i>
      No activity yet.
    </div>
  </div>

</section>
