<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/manager-layout :: layout('Sales Team', 'sales-team', ~{::section})}">
<section>

  <div class="page-header">
    <div class="ph-left">
      <div class="page-eyebrow">Manager</div>
      <h1 class="page-title">Sales Team</h1>
      <p class="page-subtitle">View and manage your sales executives</p>
    </div>
  </div>

  <!-- Empty state -->
  <div th:if="${salesExecs == null or salesExecs.isEmpty()}"
       class="card" style="margin-top:1.2rem;text-align:center;padding:3rem">
    <i class="fas fa-users" style="font-size:2.5rem;color:var(--muted-2);margin-bottom:1rem;display:block"></i>
    <p style="color:var(--muted);font-size:.9rem">No sales executives assigned to your team yet.</p>
    <p style="color:var(--muted-2);font-size:.78rem;margin-top:.4rem">
      Ask your admin to create sales executive accounts linked to your tenant.
    </p>
  </div>

  <!-- Team Cards -->
  <section th:if="${salesExecs != null and !salesExecs.isEmpty()}"
           class="team-grid" style="margin-top:1.2rem">
    <div class="team-card" th:each="exec : ${salesExecs}">
      <div style="position:relative">
        <div class="team-av" style="background:linear-gradient(135deg,#667EEA,#764BA2)"
             th:text="${exec.name != null and #strings.length(exec.name) > 0 ? exec.name.substring(0,1).toUpperCase() : 'S'}">S</div>
        <!-- Online dot for ACTIVE employees -->
        <div th:if="${exec.status?.name() == 'ACTIVE'}"
             style="width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid #fff;position:absolute;bottom:2px;right:2px"></div>
      </div>
      <div class="team-name" th:text="${exec.name ?: 'Sales Executive'}">Sales Executive</div>
      <div class="team-role">Sales Executive</div>
      <div style="font-size:.72rem;color:var(--muted)" th:text="${exec.email ?: ''}"></div>
      <div th:if="${exec.status?.name() == 'ACTIVE'}"
           style="font-size:.68rem;font-weight:600;color:#059669;background:#d1fae5;padding:2px 10px;border-radius:99px">
        Active
      </div>
      <div th:if="${exec.status?.name() != 'ACTIVE'}"
           style="font-size:.68rem;font-weight:600;color:#6b7280;background:#f3f4f6;padding:2px 10px;border-radius:99px">
        Inactive
      </div>
    </div>
  </section>

</section>
</html>
