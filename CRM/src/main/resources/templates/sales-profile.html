<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/sales-layout :: layout('My Profile', 'profile', ~{::section})}">
<head></head>
<body>
<section>

  <div class="section-header" style="margin-bottom:1.4rem">
    <h2 class="section-title"><i class="fas fa-user-circle"></i> My Profile</h2>
  </div>

  <div style="display:grid;grid-template-columns:280px 1fr;gap:1.4rem;align-items:start">

    <!-- Profile card -->
    <div style="background:var(--navy);border-radius:var(--radius-md);padding:2rem;text-align:center;box-shadow:var(--shadow-md)">
      <div style="width:80px;height:80px;border-radius:18px;background:linear-gradient(135deg,var(--orange),var(--navy-light));padding:3px;margin:0 auto 1rem">
        <div style="width:100%;height:100%;border-radius:15px;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--orange)">
          <i class="fas fa-user"></i>
        </div>
      </div>
      <h3 style="font-size:.95rem;font-weight:700;color:#fff;margin-bottom:.3rem" th:text="${#authentication?.name ?: 'Sales Executive'}">Sales Exec</h3>
      <p style="font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:.8rem">Sales Executive</p>
      <span style="display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:rgba(245,166,35,.18);color:var(--orange);border:1px solid rgba(245,166,35,.25)">Active</span>

      <div style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid rgba(255,255,255,.07)">
        <div style="display:flex;justify-content:space-between;margin-bottom:.6rem">
          <span style="font-size:.72rem;color:rgba(255,255,255,.35)">Total Leads</span>
          <span style="font-size:.72rem;font-weight:700;color:#fff" th:text="${totalLeads ?: 0}">0</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:.6rem">
          <span style="font-size:.72rem;color:rgba(255,255,255,.35)">Approved</span>
          <span style="font-size:.72rem;font-weight:700;color:var(--green)" th:text="${approvedLeads ?: 0}">0</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="font-size:.72rem;color:rgba(255,255,255,.35)">Revenue</span>
          <span style="font-size:.72rem;font-weight:700;color:var(--orange)" th:text="'₹' + ${#numbers.formatDecimal(myRevenue ?: 0, 1, 'COMMA', 0, 'POINT')}">₹0</span>
        </div>
      </div>
    </div>

    <!-- Profile details -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.6rem;box-shadow:var(--shadow-sm)">
      <h3 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)">
        Account Information
      </h3>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.4rem">
        <div>
          <label style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Full Name</label>
          <p style="font-size:.88rem;font-weight:600;color:var(--text)" th:text="${#authentication?.name ?: '—'}">—</p>
        </div>
        <div>
          <label style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Role</label>
          <p style="font-size:.88rem;font-weight:600;color:var(--text)">Sales Executive</p>
        </div>
        <div>
          <label style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Status</label>
          <span class="badge badge--green">Active</span>
        </div>
        <div>
          <label style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:4px">Conversion Rate</label>
          <p style="font-size:.88rem;font-weight:600;color:var(--text)" th:text="${conversionRate ?: 0} + '%'">0%</p>
        </div>
      </div>

      <h3 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1rem;padding-bottom:.8rem;border-top:1px solid var(--border);padding-top:1rem">
        Performance Summary
      </h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        <div style="background:var(--page-bg);border-radius:var(--radius-sm);padding:.8rem;text-align:center">
          <p style="font-size:1.4rem;font-weight:800;color:var(--text);font-family:var(--font-mono)" th:text="${totalLeads ?: 0}">0</p>
          <p style="font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Total Leads</p>
        </div>
        <div style="background:rgba(52,211,153,.08);border-radius:var(--radius-sm);padding:.8rem;text-align:center">
          <p style="font-size:1.4rem;font-weight:800;color:var(--green);font-family:var(--font-mono)" th:text="${approvedLeads ?: 0}">0</p>
          <p style="font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Approved</p>
        </div>
        <div style="background:rgba(245,166,35,.08);border-radius:var(--radius-sm);padding:.8rem;text-align:center">
          <p style="font-size:1.4rem;font-weight:800;color:var(--orange);font-family:var(--font-mono)" th:text="${pendingLeads ?: 0}">0</p>
          <p style="font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Pending</p>
        </div>
      </div>
    </div>

  </div>

</section>
</body>
</html>
