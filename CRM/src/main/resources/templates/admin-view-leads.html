<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('View Leads', 'view-leads', ~{::section})}">

<head></head>
<body>

<section>
	<div class="page-header">
		<div>
			<h1><i class="fas fa-funnel-dollar" style="color:var(--primary)"></i> Leads</h1>
			<p>Review and manage all leads submitted by managers.</p>
		</div>
		<div class="page-header-actions">
			<a th:href="@{/admin/leads?status=PENDING}" class="btn-secondary"
				th:classappend="${filter == 'PENDING'} ? ' active' : ''">
				Pending (<span th:text="${pendingCount ?: 0}">0</span>)
			</a>
			<a th:href="@{/admin/leads}" class="btn-primary">All Leads</a>
		</div>
	</div>

	<!-- Flash messages -->
	<div th:if="${success}" style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:6px;padding:12px 16px;margin-bottom:1rem;font-size:.84rem;color:#065f46;display:flex;align-items:center;gap:8px">
		<i class="fas fa-circle-check"></i> <span th:text="${success}"></span>
	</div>
	<div th:if="${error}" style="background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:12px 16px;margin-bottom:1rem;font-size:.84rem;color:#991b1b;display:flex;align-items:center;gap:8px">
		<i class="fas fa-circle-xmark"></i> <span th:text="${error}"></span>
	</div>

	<!-- KPI Row -->
	<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem">
		<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem">
			<div style="font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase">Total</div>
			<div style="font-size:1.6rem;font-weight:800;color:var(--text)" th:text="${totalLeads ?: 0}">0</div>
		</div>
		<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem">
			<div style="font-size:.72rem;color:#f59e0b;font-weight:600;text-transform:uppercase">Pending</div>
			<div style="font-size:1.6rem;font-weight:800;color:#f59e0b" th:text="${pendingCount ?: 0}">0</div>
		</div>
		<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem">
			<div style="font-size:.72rem;color:#10b981;font-weight:600;text-transform:uppercase">Approved</div>
			<div style="font-size:1.6rem;font-weight:800;color:#10b981" th:text="${approvedCount ?: 0}">0</div>
		</div>
		<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem">
			<div style="font-size:.72rem;color:#ef4444;font-weight:600;text-transform:uppercase">Rejected</div>
			<div style="font-size:1.6rem;font-weight:800;color:#ef4444" th:text="${rejectedCount ?: 0}">0</div>
		</div>
	</div>

	<!-- Leads Table -->
	<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden">
		<div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border)">
			<h3 style="font-size:.9rem;font-weight:700">
				<span th:if="${filter == 'PENDING'}">Pending Leads</span>
				<span th:if="${filter != 'PENDING'}">All Leads</span>
			</h3>
		</div>
		<div style="overflow-x:auto">
			<table style="width:100%;border-collapse:collapse;font-size:.82rem">
				<thead>
					<tr style="background:var(--bg-2,#f9fafb)">
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Lead Name</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Company</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Contact</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Value (₹)</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Status</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Submitted By</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Assigned To</th>
						<th style="padding:10px 16px;text-align:left;font-weight:600;color:var(--muted);font-size:.72rem;text-transform:uppercase">Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${leads == null or leads.isEmpty()}">
						<td colspan="8" style="padding:3rem;text-align:center;color:var(--muted)">No leads found.</td>
					</tr>
					<tr th:each="lead : ${leads}" style="border-top:1px solid var(--border)">
						<td style="padding:12px 16px;font-weight:600" th:text="${lead.customerName ?: '—'}">—</td>
						<td style="padding:12px 16px" th:text="${lead.company ?: '—'}">—</td>
						<td style="padding:12px 16px">
							<div th:text="${lead.email ?: '—'}">—</div>
							<div style="font-size:.7rem;color:var(--muted)" th:text="${lead.phone ?: ''}"></div>
						</td>
						<td style="padding:12px 16px;font-weight:700"
							th:text="${lead.dealValue != null ? '₹' + lead.dealValue : '—'}">—</td>
						<td style="padding:12px 16px">
							<span style="padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:#fef3c7;color:#92400e"
								th:if="${lead.status?.name() == 'PENDING'}">Pending</span>
							<span style="padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:#d1fae5;color:#065f46"
								th:if="${lead.status?.name() == 'APPROVED'}">Approved</span>
							<span style="padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:#fee2e2;color:#991b1b"
								th:if="${lead.status?.name() == 'REJECTED'}">Rejected</span>
							<span style="padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:var(--bg-2);color:var(--muted)"
								th:if="${lead.status?.name() != 'PENDING' and lead.status?.name() != 'APPROVED' and lead.status?.name() != 'REJECTED'}"
								th:text="${lead.status?.displayName ?: '—'}">—</span>
						</td>
						<td style="padding:12px 16px" th:text="${lead.createdBy?.name ?: '—'}">—</td>
						<td style="padding:12px 16px">
							<!-- Approve with assign dropdown -->
							<span th:if="${lead.status?.name() == 'APPROVED'}" th:text="${lead.assignedTo?.name ?: 'Unassigned'}"
								style="color:var(--muted)">—</span>
							<span th:if="${lead.status?.name() != 'APPROVED'}" style="color:var(--muted)">—</span>
						</td>
						<td style="padding:12px 16px">
							<div style="display:flex;gap:.4rem;flex-wrap:wrap">
								<!-- Approve -->
								<form th:if="${lead.status?.name() == 'PENDING'}"
									  th:action="@{/admin/leads/{id}/approve(id=${lead.id})}" method="post" style="display:inline">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<select name="assignTo" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.72rem;margin-right:4px">
										<option value="">Assign to…</option>
										<option th:each="exec : ${salesExecs}" th:value="${exec.id}" th:text="${exec.name}">—</option>
									</select>
									<button type="submit"
										style="padding:5px 12px;background:#10b981;color:#fff;border:none;border-radius:5px;font-size:.72rem;font-weight:700;cursor:pointer">
										<i class="fas fa-check"></i> Approve
									</button>
								</form>
								<!-- Reject -->
								<form th:if="${lead.status?.name() == 'PENDING'}"
									  th:action="@{/admin/leads/{id}/reject(id=${lead.id})}" method="post" style="display:inline">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<input type="text" name="rejectionNote" placeholder="Reason (optional)"
										style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.72rem;width:120px;margin-right:4px">
									<button type="submit"
										style="padding:5px 12px;background:#ef4444;color:#fff;border:none;border-radius:5px;font-size:.72rem;font-weight:700;cursor:pointer">
										<i class="fas fa-times"></i> Reject
									</button>
								</form>
								<!-- Reset to pending -->
								<form th:if="${lead.status?.name() == 'APPROVED' or lead.status?.name() == 'REJECTED'}"
									  th:action="@{/admin/leads/{id}/reset(id=${lead.id})}" method="post" style="display:inline">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button type="submit"
										style="padding:5px 12px;background:var(--bg-2);color:var(--muted);border:1px solid var(--border);border-radius:5px;font-size:.72rem;font-weight:600;cursor:pointer">
										<i class="fas fa-undo"></i> Reset
									</button>
								</form>
								<!-- Delete -->
								<form th:action="@{/admin/leads/{id}/delete(id=${lead.id})}" method="post" style="display:inline">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button type="submit"
										onclick="return confirm('Delete this lead?')"
										style="padding:5px 12px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:5px;font-size:.72rem;font-weight:600;cursor:pointer">
										<i class="fas fa-trash"></i>
									</button>
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</section>

</body>
</html>
