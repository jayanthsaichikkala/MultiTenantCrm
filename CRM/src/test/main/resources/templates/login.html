<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CRM Login</title>

	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23DC2626'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E" />

	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

	<!-- CSS connected via Thymeleaf -->
	<link rel="stylesheet" th:href="@{/login.css}" />
</head>

<body>

	<div class="card">

		<!-- ── Left Panel ────────────────────────────── -->
		<div class="panel-left">

			<div class="logo-row">
				<div class="logo-icon">
					<!-- Grid / app icon -->
					<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<rect x="3" y="3" width="7" height="7" rx="1" />
						<rect x="14" y="3" width="7" height="7" rx="1" />
						<rect x="3" y="14" width="7" height="7" rx="1" />
						<rect x="14" y="14" width="7" height="7" rx="1" />
					</svg>
				</div>
				<span class="logo-name">CRM Portal</span>
			</div>

			<div class="diamonds">
				<div class="diamond"></div>
				<div class="diamond lg"></div>
				<div class="diamond"></div>
			</div>

			<div class="panel-bottom">
				<h2>Welcome Back!</h2>
				<p>To keep connected with us please login with your personal info.</p>
			</div>

		</div><!-- /panel-left -->

		<!-- ── Right Panel ───────────────────────────── -->
		<div class="panel-right">

			<h1>Login</h1>

			<!-- Error alert (shown when ?error is in URL — set by Spring Security) -->
			<div th:if="${param.error}" class="alert alert-error">
				Invalid username or password. Please try again.
			</div>

			<!-- Logout alert (shown when ?logout is in URL) -->
			<div th:if="${param.logout}" class="alert alert-success">
				Logged out successfully.
			</div>

			<!--
				Login form.
				action   → POST /login  (processed by Spring Security, not a controller)
				fields   → name="usernameOrEmail"  matched by .usernameParameter() in SecurityConfig
				         → name="password"         matched by .passwordParameter() in SecurityConfig
				CSRF     → required by Spring Security
			-->
			<form th:action="@{/login}" method="post">

				<!-- Username / Email -->
				<div class="form-group">
					<span class="input-icon">
						<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
							<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
							<circle cx="12" cy="7" r="4" />
						</svg>
					</span>
					<input class="form-input" type="text" name="usernameOrEmail" placeholder="Username or Email"
						autocomplete="username" required />
				</div>

				<!-- Password -->
				<div class="form-group">

					<!-- Left lock icon -->
					<span class="input-icon">
						<svg viewBox="0 0 24 24">
							<rect x="3" y="11" width="18" height="11" rx="2" />
							<path d="M7 11V7a5 5 0 0 1 10 0v4" />
						</svg>
					</span>

					<input id="password" class="form-input" type="password" name="password" placeholder="Password"
						autocomplete="current-password" required />

					<!-- Eye / toggle icon -->
					<span class="toggle-password" onclick="togglePassword()">
						<svg id="eyeIcon" viewBox="0 0 24 24">
							<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
							<circle cx="12" cy="12" r="3" />
						</svg>
					</span>

				</div>

				<!-- CSRF token — Spring Security requires this on every POST -->
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<button type="submit" class="btn-primary">Sign In</button>

			</form>

		</div><!-- /panel-right -->

	</div><!-- /card -->

	<script>
		function togglePassword() {
			const passwordInput = document.getElementById("password");
			const eyeIcon = document.getElementById("eyeIcon");

			if (passwordInput.type === "password") {
				passwordInput.type = "text";
				eyeIcon.style.opacity = "0.5";
			} else {
				passwordInput.type = "password";
				eyeIcon.style.opacity = "1";
			}
		}
	</script>

</body>

</html>
